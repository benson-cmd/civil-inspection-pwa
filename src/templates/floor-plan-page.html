<section class="page">
  <header class="meta">
    <div>案件編號：{{case_no}}</div>
    <div>鑑定日期：{{inspection_date}}</div>
    <div>標的物地址：{{target_address}}</div>
  </header>
  <h1>現況調查照片位置平面圖 {{floor_name}}</h1>
  <div class="plan">{{plan_svg}}</div>
  <ul class="legend">
    <li>○ 代表照片位置</li>
    <li>→ 代表照片拍攝方向</li>
    <li>X 代表不便進入</li>
  </ul>
</section>
